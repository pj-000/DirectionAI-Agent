# DirectionAI Agent - Production Environment
# Based on DeerFlow v2 framework with PPT generation integration
#
# Services:
#   - nginx:       Reverse proxy (port 2026)
#   - frontend:    Next.js production server
#   - gateway:     FastAPI Gateway API (includes PPT generation)
#   - langgraph:   LangGraph production server
#
# Usage:
#   docker compose up -d
#
# Environment variables (set in .env):
#   MINIMAX_API_KEY     - MiniMax API key
#   ANTHROPIC_API_KEY  - Anthropic API key
#   BETTER_AUTH_SECRET  - Required for frontend auth

services:
  # ── Reverse Proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: directionai-nginx
    ports:
      - "${PORT:-2026}:2026"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - gateway
      - langgraph
    networks:
      - directionai
    restart: unless-stopped

  # ── Frontend: Next.js Production ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    container_name: directionai-frontend
    environment:
      - CI=true
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - DEER_FLOW_INTERNAL_GATEWAY_BASE_URL=http://gateway:8001
      - DEER_FLOW_INTERNAL_LANGGRAPH_BASE_URL=http://langgraph:2024
    env_file:
      - ./frontend/.env
    networks:
      - directionai
    restart: unless-stopped

  # ── Gateway API (includes PPT generation) ────────────────────────────────
  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - APT_MIRROR=${APT_MIRROR:-}
    container_name: directionai-gateway
    command: sh -c "cd backend && PYTHONPATH=. uv run uvicorn app.gateway.app:app --host 0.0.0.0 --port 8001 --workers 2"
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - DEER_FLOW_HOST_BASE_DIR=/app/backend/.deer-flow
      - DEER_FLOW_HOST_SKILLS_PATH=/mnt/skills
      - DEER_FLOW_SANDBOX_HOST=host.docker.internal
      - DEER_FLOW_CHANNELS_LANGGRAPH_URL=http://langgraph:2024
      - DEER_FLOW_CHANNELS_GATEWAY_URL=http://gateway:8001
    volumes:
      - ./config.yaml:/app/backend/config.yaml:ro
      - ./skills:/mnt/skills:ro
      - ./outputs:/mnt/user-data/outputs
      - ${DEER_FLOW_HOME:-./.deer-flow}:/app/backend/.deer-flow
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.claude:/root/.claude:ro
      - ${HOME}/.codex:/root/.codex:ro
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - directionai
    restart: unless-stopped

  # ── LangGraph Server ─────────────────────────────────────────────────────
  langgraph:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - APT_MIRROR=${APT_MIRROR:-}
    container_name: directionai-langgraph
    command: sh -c "cd backend && uv run langgraph dev --no-browser --allow-blocking --no-reload --host 0.0.0.0 --port 2024 --n-jobs-per-worker 10"
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - DEER_FLOW_CONFIG_PATH=/app/config.yaml
      - DEER_FLOW_HOST_BASE_DIR=/app/backend/.deer-flow
      - DEER_FLOW_HOST_SKILLS_PATH=/mnt/skills
      - DEER_FLOW_SANDBOX_HOST=host.docker.internal
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./skills:/mnt/skills:ro
      - ./outputs:/mnt/user-data/outputs
      - ${DEER_FLOW_HOME:-./.deer-flow}:/app/backend/.deer-flow
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.claude:/root/.claude:ro
      - ${HOME}/.codex:/root/.codex:ro
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - directionai
    restart: unless-stopped

networks:
  directionai:
    name: directionai-network
